                var searchInput = document.getElementById("component-search");
                var list_el = document.getElementById("component-list");
                var resultCount = document.getElementById("result-count");

                function renderCards(list) {
                    list_el.innerHTML = "";
                    for (var i = 0; i < list.length; i++) {
                        var c = list[i];
                        var li = document.createElement("li");
                        li.style.borderBottom = "1px solid var(--nhs-color-border, #d8dde0)";
                        li.style.padding = "var(--nhs-space-3) 0";
                        li.innerHTML =
                            '<a href="component.html?slug=' +
                            encodeURIComponent(c.slug) +
                            '" style="font-weight: 700;">' +
                            c.name +
                            "</a>" +
                            '<span style="color: var(--nhs-color-secondary, #4c6272); margin-left: 0.5rem;">' +
                            c.description.charAt(0).toUpperCase() +
                            c.description.slice(1) +
                            ".</span>";
                        list_el.appendChild(li);
                    }
                    resultCount.textContent =
                        list.length +
                        " of " +
                        components.length +
                        " components";
                }

                function filterComponents() {
                    var query = searchInput.value.toLowerCase().trim();
                    if (!query) {
                        renderCards(components);
                        return;
                    }
                    var filtered = [];
                    for (var i = 0; i < components.length; i++) {
                        var c = components[i];
                        if (
                            c.slug.indexOf(query) !== -1 ||
                            c.name.toLowerCase().indexOf(query) !== -1 ||
                            c.description.toLowerCase().indexOf(query) !== -1
                        ) {
                            filtered.push(c);
                        }
                    }
                    renderCards(filtered);
                }

                searchInput.addEventListener("input", filterComponents);

                renderCards(components);
            })();
